<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niccoli — Logo</title>
<link rel="stylesheet" href="https://unpkg.com/@fontsource/cormorant-garamond/300.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    transition: background 0.2s;
  }
  body.dark { background: #0d0d0b; }

  .lockup {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .wordblock {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 0.22em;
    color: #0d0d0b;
    transition: color 0.2s;
    line-height: 1;
  }

  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: #888;
    transition: color 0.2s;
    line-height: 1;
    padding-left: 2px;
  }

  body.dark .name { color: #e8e4db; }
  body.dark .sub { color: #444440; }

  path { stroke: #0d0d0b; transition: stroke 0.2s; }
  body.dark path { stroke: #e8e4db; }

  .tog-row {
    position: fixed;
    top: 20px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  body.dark .tog-row { color: #333; }
  .tog {
    width: 28px; height: 16px;
    background: #ccc;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    display: inline-block;
    transition: background 0.2s;
  }
  .tog.on { background: #e8e4db; }
  .tog-knob {
    position: absolute;
    top: 2px; left: 2px;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .tog.on .tog-knob { background: #0d0d0b; transform: translateX(12px); }
</style>
</head>
<body id="body">

  <div class="tog-row">
    Dark
    <div class="tog" id="tog" onclick="toggleDark()"><div class="tog-knob"></div></div>
  </div>

  <div class="lockup">
    <svg width="22" height="34" viewBox="0 0 22 34" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 32 L3 15 Q3 2 11 2 Q19 2 19 15 L19 32" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="wordblock">
      <span class="name">NICCOLI</span>
      <span class="sub">RESEARCH</span>
    </div>
  </div>

<script>
let dark = false;
function toggleDark() {
  dark = !dark;
  document.getElementById('tog').classList.toggle('on', dark);
  document.getElementById('body').classList.toggle('dark', dark);
}
</script>
</body>
</html>
