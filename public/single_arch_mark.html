
<style>
  .sheet { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .sheet.dark { background: #0d0d0b; border-color: #1e1e1c; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .sheet.dark .topbar { border-color: #1e1e1c; }
  .tog { width: 28px; height: 16px; background: var(--color-border-secondary); border-radius: 8px; position: relative; cursor: pointer; display: inline-block; transition: background 0.2s; }
  .tog.on { background: #e8e4db; }
  .tog-knob { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .tog.on .tog-knob { background: #0d0d0b; transform: translateX(12px); }
  .toplabel { font-size: 11px; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; }
  .sheet.dark .toplabel { color: #3a3a38; }
  .stage { display: flex; align-items: center; justify-content: center; padding: 100px 40px; }
  .s { stroke: #0d0d0b; transition: stroke 0.2s; }
  .sheet.dark .s { stroke: #e8e4db; }
</style>

<div class="sheet" id="sheet">
  <div class="topbar">
    <span class="toplabel">The arch</span>
    <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--color-text-tertiary)">
      Dark <div class="tog" id="tog" onclick="toggleDark()"><div class="tog-knob"></div></div>
    </div>
  </div>
  <div class="stage">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <path class="s" d="M20 130 L20 70 Q20 10 70 10 Q120 10 120 70 L120 130" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<script>
let dark = false;
function toggleDark() {
  dark = !dark;
  document.getElementById('tog').classList.toggle('on', dark);
  document.getElementById('sheet').classList.toggle('dark', dark);
  document.querySelectorAll('.s').forEach(el => el.setAttribute('stroke', dark ? '#e8e4db' : '#0d0d0b'));
}
</script>
